apiVersion: zen.cpd.ibm.com/v1
kind: ZenExtension
metadata:
  name: {{ .serviceName }}
spec:
  extensions: |
    [
      {
        "extension_name": "{{ .serviceName }}",
        "details": {
          "upstream_conf": "upstream.conf",
          "location_conf": "nginx.conf"
        }
      }
    ]
  upstream.conf: |
    upstream {{ .upstreamName }} {
      keepalive 32;
      keepalive_timeout 30s;
      keepalive_requests 500;
      server {{ .serviceName }}.{{ .dpPhyLocWorkloadNs }}.svc:{{ .servicePort }};
    }
  nginx.conf: |
    location ~* /{{ .serviceName }}/(.*) {
      proxy_http_version 1.1;
      proxy_set_header Host $host;
      proxy_set_header Connection "";
      proxy_ssl_server_name on;
      proxy_buffering off;
      proxy_pass {{ .serviceUrlScheme }}://{{ .upstreamName }}/physical_location/{{ .zenPhysicalLocationName }}/{{ .serviceName }}/$1$is_args$args;
      proxy_pass_header X-Accel-Buffering;
      ##preserve original host on app redirect
      proxy_redirect ~^(https?://[^/]+)?/physical_location/(.*) $scheme://$http_x_original_host/physical_location/$2;
      proxy_set_header Accept-Encoding "";
    }
